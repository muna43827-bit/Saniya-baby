<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saniya - Hands Free</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle at center, #1a0012, #000); 
            color: #fff; font-family: 'Poppins', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; 
            overflow: hidden; padding: 60px 20px;
        }
        h1.brand { font-family: 'Cinzel', serif; color: #ff007f; text-shadow: 0 0 20px #ff007f; font-size: 2.2rem; letter-spacing: 5px; }
        .status-text { font-size: 0.9rem; color: #ff80bf; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
        #visualizer { display: flex; align-items: center; justify-content: center; gap: 6px; height: 120px; margin: auto; }
        .bar { width: 6px; height: 15px; background: linear-gradient(to top, #ff007f, #ff5e62); border-radius: 10px; transition: height 0.15s ease; }
        #start-btn { 
            padding: 20px 40px; background: #ff007f; color: white; border: none; 
            border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #ff007f;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div style="text-align:center">
        <h1 class="brand">SANIYA</h1>
        <p class="status-text" id="status-label">Offline</p>
    </div>
    
    <div id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div id="controls">
        <button id="start-btn">START HANDS-FREE CALL</button>
    </div>

    <script>
        const statusLabel = document.getElementById('status-label');
        const startBtn = document.getElementById('start-btn');
        const bars = document.querySelectorAll('.bar');
        const GROQ_API_KEY = "Gsk_JRJOCOMr7VOyZH9065VxWGdyb3FYuVeOfge0A2hRTb2VFoeSQiFh";

        let visualizerInterval;
        const synth = window.speechSynthesis;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recog = new SpeechRec();
        
        recog.lang = 'hi-IN';
        recog.continuous = false; // We will restart it manually for better control

        function startVisualizer() {
            clearInterval(visualizerInterval);
            visualizerInterval = setInterval(() => {
                bars.forEach(bar => { bar.style.height = (Math.random() * 80 + 10) + "px"; });
            }, 100);
        }

        function stopVisualizer() {
            clearInterval(visualizerInterval);
            bars.forEach(bar => bar.style.height = "15px");
        }

        async function getSaniyaResponse(text) {
            statusLabel.innerText = "Saniya Soch Rahi Hai...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: "Tumhara naam Saniya hai. Sahil ki romantic AI companion. Tum hamesha sunti rehti ho. Chhote aur pyare replies do." }, { role: "user", content: text }]
                    })
                });
                const data = await response.json();
                speak(data.choices[0].message.content);
            } catch (e) {
                statusLabel.innerText = "Error!";
                recog.start(); // Restart listening even on error
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'hi-IN';
            msg.pitch = 1.3;
            msg.onstart = () => { statusLabel.innerText = "Saniya Bol Rahi Hai..."; startVisualizer(); };
            msg.onend = () => { 
                stopVisualizer(); 
                statusLabel.innerText = "Listening..."; 
                recog.start(); // Sabse important: Bolne ke baad wapas sunna shuru!
            };
            synth.speak(msg);
        }

        recog.onresult = (e) => {
            const result = e.results[0][0].transcript;
            getSaniyaResponse(result);
        };

        recog.onend = () => {
            // Agar Saniya nahi bol rahi, toh listen mode on rakho
            if (!synth.speaking) {
                recog.start();
            }
        };

        startBtn.onclick = () => {
            startBtn.classList.add('hidden');
            statusLabel.innerText = "Listening...";
            speak("Hi Sahil, main tayaar hoon. Ab aapko button dabane ki zaroorat nahi hai. Boliye, kya haal hai?");
        };
    </script>
</body>
</html>

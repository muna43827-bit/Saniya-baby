<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saniya AI - Unlimited Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: radial-gradient(circle at center, #1a0012, #000); color: #fff; font-family: 'Poppins', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        #auth-screen { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 30px; backdrop-filter: blur(15px); border: 1px solid #ff007f33; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 0, 127, 0.1); }
        .start-btn { background: linear-gradient(45deg, #ff007f, #ff5e62); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4); }
        
        #call-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 20px; }
        h1.brand { font-family: 'Cinzel', serif; color: #ff007f; text-shadow: 0 0 20px #ff007f; font-size: 2.5rem; letter-spacing: 5px; }
        
        /* Trading Line Visualizer */
        #visualizer { display: flex; align-items: center; justify-content: center; gap: 8px; height: 150px; }
        .bar { width: 8px; height: 20px; background: #ff007f; border-radius: 10px; transition: 0.1s; box-shadow: 0 0 10px #ff007f; }
        
        .status { font-size: 0.8rem; color: #ff80bf; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color: #ff007f; margin-bottom: 10px; font-family: 'Cinzel';">SANIYA</h1>
        <p style="opacity: 0.8;">Luxury Hands-Free Experience</p>
        <button class="start-btn" onclick="initCall()">START CALL</button>
    </div>

    <div id="call-screen">
        <div style="text-align: center;">
            <h1 class="brand">SANIYA</h1>
            <p class="status" id="status-label">Connecting...</p>
        </div>

        <div id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <p style="color: #444; font-size: 11px; letter-spacing: 1px;">Saniya is listening to you...</p>
    </div>

    <script>
        // --- MULTI-KEY SYSTEM ---
        const GROQ_KEYS = [
            "Gsk_JRJOCOMr7VOyZH9065VxWGdyb3FYuVeOfge0A2hRTb2VFoeSQiFh", // Key 1
            "YAHAN_DUSRI_KEY_DALO", // Key 2 (Backup)
            "YAHAN_TEESRI_KEY_DALO"  // Key 3 (Backup)
        ];
        
        let currentKeyIndex = 0;
        let userName = "Sahil";

        const statusLabel = document.getElementById('status-label');
        const bars = document.querySelectorAll('.bar');
        const synth = window.speechSynthesis;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recog = new SpeechRec();

        recog.lang = 'hi-IN';
        recog.continuous = false;

        function animateBars(active) {
            if(!active) { bars.forEach(b => b.style.height = "20px"); return; }
            bars.forEach(b => { b.style.height = (Math.random() * 110 + 20) + "px"; });
        }

        async function getSaniyaResponse(text) {
            statusLabel.innerText = "Thinking...";
            let success = false;

            // Try each key until one works
            for (let i = currentKeyIndex; i < GROQ_KEYS.length; i++) {
                try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { 
                            "Authorization": `Bearer ${GROQ_KEYS[i]}`, 
                            "Content-Type": "application/json" 
                        },
                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            messages: [
                                { role: "system", content: `Tumhara naam Saniya hai. Tum ${userName} ki romantic AI companion ho. Tum call par baat kar rahi ho. Short, sweet aur Hinglish replies do.` },
                                { role: "user", content: text }
                            ]
                        })
                    });

                    const data = await response.json();
                    if (data.choices) {
                        currentKeyIndex = i; // Save working key
                        speak(data.choices[0].message.content);
                        success = true;
                        break;
                    } else if (data.error && data.error.code === "rate_limit_exceeded") {
                        console.log(`Key ${i} exhausted. Trying next...`);
                        continue;
                    }
                } catch (e) {
                    console.error("Key failed:", e);
                }
            }

            if (!success) {
                statusLabel.innerText = "ALL KEYS EXHAUSTED";
                speak("Maaf karna Sahil, aaj meri saari limit khatam ho gayi hai. Kal baat karte hain?");
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'hi-IN';
            msg.pitch = 1.4;
            
            let visInterval;
            msg.onstart = () => { 
                statusLabel.innerText = "Saniya Speaking..."; 
                visInterval = setInterval(() => animateBars(true), 100); 
            };
            msg.onend = () => { 
                statusLabel.innerText = "Listening..."; 
                clearInterval(visInterval);
                animateBars(false); 
                recog.start(); 
            };
            synth.speak(msg);
        }

        recog.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            getSaniyaResponse(transcript);
        };

        recog.onerror = () => { recog.stop(); setTimeout(() => recog.start(), 500); };

        function initCall() {
            userName = prompt("Saniya aapko kis naam se pukare?", "Sahil") || "Sahil";
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('call-screen').style.display = 'flex';
            speak(`Hi ${userName}! Main tayaar hoon. Bataiye kya chal raha hai aapke mann mein?`);
        }
    </script>
</body>
</html>
